<!-- @dsCard group="Components" viewport="700x180" name="Tabs" subtitle="Underline tab navigation with count chips" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 8px 18px 18px; box-shadow: var(--shadow-sm); }
  .body { padding: 18px 4px 4px; color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Tabs } = window.DokaDesignSystem_7dbee8;
  function Demo() {
    const [tab, setTab] = React.useState('transit');
    const labels = {all:'all shipments', transit:'shipments in transit', delivered:'delivered shipments', exceptions:'shipments with exceptions'};
    return (
      <div className="panel">
        <Tabs value={tab} onChange={setTab} tabs={[
          {key:'all', label:'All', count:1284},
          {key:'transit', label:'In transit', count:412},
          {key:'delivered', label:'Delivered', count:806},
          {key:'exceptions', label:'Exceptions', count:7},
        ]} />
        <div className="body">Showing {labels[tab]}.</div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>

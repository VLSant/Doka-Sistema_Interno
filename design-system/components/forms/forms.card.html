<!-- @dsCard group="Components" viewport="700x460" name="Forms & Actions" subtitle="Button, IconButton, Input, Select, Switch, Checkbox" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 22px; max-width: 660px; }
  .group { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-sm); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton, Input, Select, Switch, Checkbox } = window.DokaDesignSystem_7dbee8;
  const Ico = ({d, w=18}) => <svg width={w} height={w} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
  const Search = <Ico d={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />;
  const Truck = <Ico d={<><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.62l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></>} />;

  function Demo() {
    const [hub, setHub] = React.useState('cwb');
    const [live, setLive] = React.useState(true);
    const [sig, setSig] = React.useState(false);
    return (
      <div className="stack">
        <div className="panel">
          <div className="lbl">Buttons</div>
          <div className="group">
            <Button leftIcon={Truck}>Track shipment</Button>
            <Button variant="secondary">Secondary</Button>
            <Button variant="outline">Outline</Button>
            <Button variant="ghost">Ghost</Button>
            <Button variant="danger">Cancel run</Button>
          </div>
          <div className="group" style={{marginTop:12}}>
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
            <Button loading>Loading</Button>
            <Button disabled>Disabled</Button>
            <IconButton aria-label="search" variant="soft">{Search}</IconButton>
            <IconButton aria-label="search" variant="primary">{Truck}</IconButton>
          </div>
        </div>
        <div className="panel">
          <div className="lbl">Inputs</div>
          <div className="grid2">
            <Input label="Tracking code" placeholder="DK-0000-0000-BR" leftIcon={Search} />
            <Select label="Origin hub" value={hub} onChange={setHub} options={[{value:'cwb',label:'Curitiba — CWB'},{value:'gru',label:'São Paulo — GRU'},{value:'cnf',label:'Belo Horizonte — CNF'}]} />
          </div>
          <div className="group" style={{marginTop:16, gap:24}}>
            <Switch checked={live} onChange={setLive} label="Live tracking" />
            <Checkbox checked={sig} onChange={setSig} label="Require signature" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>

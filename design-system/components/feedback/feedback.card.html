<!-- @dsCard group="Components" viewport="700x320" name="Status & Progress" subtitle="StatusPill (shipment states) + ProgressTracker journey" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { StatusPill, ProgressTracker } = window.DokaDesignSystem_7dbee8;
  function Demo() {
    return (
      <div className="stack">
        <div className="panel">
          <div className="lbl">Shipment status</div>
          <div className="row">
            <StatusPill status="delivered" />
            <StatusPill status="transit" />
            <StatusPill status="out" />
            <StatusPill status="delayed" />
            <StatusPill status="exception" />
            <StatusPill status="pending" />
          </div>
        </div>
        <div className="panel">
          <div className="lbl">Delivery journey</div>
          <ProgressTracker current={2} steps={[
            {label:'Picked up', sub:'09:12'},
            {label:'In transit', sub:'11:40'},
            {label:'Out for delivery', sub:'14:05'},
            {label:'Delivered', sub:'ETA 15:30'},
          ]} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>

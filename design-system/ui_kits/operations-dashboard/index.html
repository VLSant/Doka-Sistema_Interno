<!-- @startingPoint section="Screens" subtitle="Doka Operations Dashboard — full logistics control center" viewport="1280x820" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Doka · Operations</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--surface-page); }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="../../assets/icons/icons.jsx"></script>
<script src="data.js"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="DashboardView.jsx"></script>
<script type="text/babel" src="ShipmentsView.jsx"></script>
<script type="text/babel" src="ShipmentDetail.jsx"></script>
<script type="text/babel">
  const { Sidebar, Topbar } = window.DokaShell;
  const Icon = window.Icon;
  const DashboardView = window.DokaDashboardView;
  const ShipmentsView = window.DokaShipmentsView;
  const ShipmentDetail = window.DokaShipmentDetail;

  const TITLES = {
    dashboard: { t: 'Operations', s: 'Tuesday, 16 June · Curitiba control center' },
    shipments: { t: 'Shipments', s: '1,284 active across 6 hubs' },
    routes: { t: 'Routes', s: 'Live route planning' },
    fleet: { t: 'Fleet', s: 'Vehicles & drivers' },
    hubs: { t: 'Hubs', s: 'Distribution network' },
    team: { t: 'Team', s: 'Operators & permissions' },
  };

  function Placeholder({ name }) {
    return (
      <div style={{ padding: 24 }}>
        <div style={{ height: 420, borderRadius: 'var(--radius-lg)', border: '1.5px dashed var(--border-default)', background: 'var(--surface-card)', display: 'flex', flexDirection: 'column', gap: 10, alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)' }}>
          <Icon name={name} size={32} color="var(--purple-300)" />
          <span style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600, color: 'var(--text-body)' }}>{TITLES[name] ? TITLES[name].t : name} workspace</span>
          <span style={{ fontFamily: 'var(--font-sans)', fontSize: 13 }}>Connect a data source to populate this view.</span>
        </div>
      </div>
    );
  }

  function App() {
    const [view, setView] = React.useState('dashboard');
    const [detail, setDetail] = React.useState(null);
    const open = (kind, payload) => {
      if (kind === 'detail') setDetail(payload);
      else { setView(kind); setDetail(null); }
    };
    const meta = TITLES[view] || { t: view, s: '' };
    return (
      <div style={{ display: 'flex', height: '100%', position: 'relative' }}>
        <Sidebar view={view} setView={(v) => { setView(v); setDetail(null); }} />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
          <Topbar title={meta.t} subtitle={meta.s} />
          <main style={{ flex: 1, overflowY: 'auto' }}>
            {view === 'dashboard' && <DashboardView onOpen={open} />}
            {view === 'shipments' && <ShipmentsView onOpen={open} />}
            {!['dashboard', 'shipments'].includes(view) && <Placeholder name={view} />}
          </main>
        </div>
        <ShipmentDetail shipment={detail} onClose={() => setDetail(null)} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

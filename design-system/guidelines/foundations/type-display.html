<!-- @dsCard group="Type" viewport="700x210" name="Display · Poppins" subtitle="Headlines & hero — Poppins ExtraBold/Bold, tight tracking." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); font-family: var(--font-display); color: var(--text-strong); }
  .big { font-size: 54px; font-weight: 800; line-height: 1.0; letter-spacing: -0.02em; }
  .mid { font-size: 28px; font-weight: 600; line-height: 1.1; margin-top: 8px; color: var(--text-body); }
  .meta { font-size: 11px; color: var(--text-muted); margin-top: 16px; font-weight: 500; }
  .o { color: var(--brand-primary); }
</style>
</head>
<body>
  <div class="big">Entrega e montagem, <span class="o">sem dor de cabeça.</span></div>
  <div class="mid">Coordenamos motoristas e montadores.</div>
  <div class="meta">Poppins · ExtraBold 800 / Bold 700 · tracking −0.02em</div>
</body>
</html>

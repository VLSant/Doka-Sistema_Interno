<!-- @dsCard group="Type" viewport="700x270" name="Body & UI · Poppins" subtitle="The workhorse weights — Regular to SemiBold for UI, labels, prose." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-body); }
  .line { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--neutral-100); }
  .tag { font-size: 10px; color: var(--text-subtle); width: 110px; flex: none; font-weight: 500; }
  .s { color: var(--text-strong); }
</style>
</head>
<body>
  <div class="line"><span class="tag">2xl · Bold</span><span class="s" style="font-size:30px;font-weight:700">Visão geral das ordens</span></div>
  <div class="line"><span class="tag">lg · SemiBold</span><span class="s" style="font-size:20px;font-weight:600">Serviços de hoje</span></div>
  <div class="line"><span class="tag">base · Regular</span><span style="font-size:15px">Montador a caminho do endereço do cliente.</span></div>
  <div class="line"><span class="tag">sm · Medium</span><span class="s" style="font-size:13px;font-weight:500">Código da ordem</span></div>
  <div class="line"><span class="tag">xs · Bold caps</span><span class="doka-eyebrow">Operações</span></div>
</body>
</html>

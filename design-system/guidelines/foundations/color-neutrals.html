<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Warm grays anchored on brand #E6E6E6 and charcoal #3B3B3B." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-subtle); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px 8px; }
  .sw b { font-size: 10px; font-weight: 700; }
  .sw span { font-size: 9px; font-family: var(--font-mono); opacity: 0.85; }
  .dark { color: #fff; }
  .light { color: var(--neutral-900); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--neutral-0)"><b>0</b><span>FFFFFF</span></div>
    <div class="sw light" style="background:var(--neutral-50)"><b>50</b><span>FAF9FA</span></div>
    <div class="sw light" style="background:var(--neutral-100)"><b>100</b><span>F4F2F4</span></div>
    <div class="sw light" style="background:var(--neutral-200)"><b>200</b><span>E6E6E6</span></div>
    <div class="sw light" style="background:var(--neutral-300)"><b>300</b><span>D6D4D8</span></div>
    <div class="sw light" style="background:var(--neutral-400)"><b>400</b><span>B4B1B7</span></div>
    <div class="sw dark" style="background:var(--neutral-500)"><b>500</b><span>8B888F</span></div>
    <div class="sw dark" style="background:var(--neutral-600)"><b>600</b><span>66636A</span></div>
    <div class="sw dark" style="background:var(--neutral-700)"><b>700</b><span>3B3B3B</span></div>
    <div class="sw dark" style="background:var(--neutral-900)"><b>900</b><span>1D1D1F</span></div>
  </div>
</body>
</html>

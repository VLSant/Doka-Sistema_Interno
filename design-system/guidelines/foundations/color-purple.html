<!-- @dsCard group="Colors" viewport="700x150" name="Brand · Purple" subtitle="Secondary. Doka purple #602860 for depth, headers, dark UI." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw b { font-size: 11px; font-weight: 700; }
  .sw span { font-size: 10px; font-family: var(--font-mono); opacity: 0.85; }
  .dark { color: #fff; }
  .light { color: var(--neutral-900); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--purple-50)"><b>50</b><span>#F3EBF3</span></div>
    <div class="sw light" style="background:var(--purple-100)"><b>100</b><span>#E3CFE2</span></div>
    <div class="sw light" style="background:var(--purple-200)"><b>200</b><span>#C9A5C7</span></div>
    <div class="sw dark" style="background:var(--purple-300)"><b>300</b><span>#A876A6</span></div>
    <div class="sw dark" style="background:var(--purple-400)"><b>400</b><span>#844E82</span></div>
    <div class="sw dark" style="background:var(--purple-500);outline:2px solid #fff;outline-offset:-3px"><b>500</b><span>#602860</span></div>
    <div class="sw dark" style="background:var(--purple-600);outline:2px solid #fff;outline-offset:-3px"><b>600</b><span>#4F204E</span></div>
    <div class="sw dark" style="background:var(--purple-700)"><b>700</b><span>#401A3F</span></div>
    <div class="sw dark" style="background:var(--purple-800)"><b>800</b><span>#301330</span></div>
    <div class="sw dark" style="background:var(--purple-900)"><b>900</b><span>#220D22</span></div>
  </div>
</body>
</html>

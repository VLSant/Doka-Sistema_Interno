<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid · space-1 → space-13." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--orange-500); border-radius: 3px; width: 100%; }
  .item span { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
  .item b { font-size: 10px; color: var(--text-strong); }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="width:16px"><div class="bar" style="height:4px"></div><b>1</b><span>4</span></div>
    <div class="item" style="width:18px"><div class="bar" style="height:8px"></div><b>2</b><span>8</span></div>
    <div class="item" style="width:20px"><div class="bar" style="height:12px"></div><b>3</b><span>12</span></div>
    <div class="item" style="width:24px"><div class="bar" style="height:16px"></div><b>4</b><span>16</span></div>
    <div class="item" style="width:28px"><div class="bar" style="height:20px"></div><b>5</b><span>20</span></div>
    <div class="item" style="width:32px"><div class="bar" style="height:24px"></div><b>6</b><span>24</span></div>
    <div class="item" style="width:40px"><div class="bar" style="height:32px"></div><b>7</b><span>32</span></div>
    <div class="item" style="width:48px"><div class="bar" style="height:40px"></div><b>8</b><span>40</span></div>
    <div class="item" style="width:56px"><div class="bar" style="height:48px"></div><b>9</b><span>48</span></div>
    <div class="item" style="width:72px"><div class="bar" style="height:64px"></div><b>10</b><span>64</span></div>
    <div class="item" style="width:88px"><div class="bar" style="height:80px"></div><b>11</b><span>80</span></div>
  </div>
</body>
</html>

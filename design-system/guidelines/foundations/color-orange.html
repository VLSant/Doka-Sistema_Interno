<!-- @dsCard group="Colors" viewport="700x150" name="Brand · Orange" subtitle="Primary. Doka orange #F09018 anchors CTAs, focus, energy." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw b { font-size: 11px; font-weight: 700; }
  .sw span { font-size: 10px; font-family: var(--font-mono); opacity: 0.85; }
  .dark { color: #fff; }
  .light { color: var(--neutral-900); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--orange-50)"><b>50</b><span>#FEF4E6</span></div>
    <div class="sw light" style="background:var(--orange-100)"><b>100</b><span>#FBE2C0</span></div>
    <div class="sw light" style="background:var(--orange-200)"><b>200</b><span>#F8CB8C</span></div>
    <div class="sw light" style="background:var(--orange-300)"><b>300</b><span>#F5B257</span></div>
    <div class="sw light" style="background:var(--orange-400)"><b>400</b><span>#F29E30</span></div>
    <div class="sw light" style="background:var(--orange-500);outline:2px solid var(--neutral-900);outline-offset:-2px"><b>500</b><span>#F09018</span></div>
    <div class="sw dark" style="background:var(--orange-600)"><b>600</b><span>#D87F10</span></div>
    <div class="sw dark" style="background:var(--orange-700)"><b>700</b><span>#B0660A</span></div>
    <div class="sw dark" style="background:var(--orange-800)"><b>800</b><span>#8A4F0A</span></div>
    <div class="sw dark" style="background:var(--orange-900)"><b>900</b><span>#663A08</span></div>
  </div>
</body>
</html>

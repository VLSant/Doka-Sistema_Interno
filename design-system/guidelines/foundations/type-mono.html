<!-- @dsCard group="Type" viewport="700x180" name="Numerals & codes · Poppins" subtitle="Tabular Poppins (tnum) for order codes, KPIs, timestamps." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); font-family: var(--font-mono); color: var(--text-strong); font-feature-settings: var(--num-tabular); }
  .big { font-size: 28px; font-weight: 700; letter-spacing: 0.01em; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 28px; margin-top: 16px; font-size: 15px; font-weight: 600; }
  .grid div span { color: var(--text-muted); font-size: 11px; font-weight: 500; display: block; margin-bottom: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
  .o { color: var(--brand-primary); }
</style>
</head>
<body>
  <div class="big">DK-<span class="o">8847</span>-2291-BR</div>
  <div class="grid">
    <div><span>Ordem</span>OS 9 780 142</div>
    <div><span>Janela</span>2026-06-18 · 14:00–16:00</div>
    <div><span>Itens</span>3 volumes</div>
    <div><span>Equipe</span>CMNL-CWB-03</div>
  </div>
</body>
</html>

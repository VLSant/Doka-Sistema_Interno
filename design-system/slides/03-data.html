<!-- @dsCard group="Slides" viewport="1280x720" name="Data slide" subtitle="KPI grid + chart, brand-styled" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: var(--surface-card); position: relative; overflow: hidden; padding: 64px 96px; box-sizing: border-box; }
  .head { display: flex; align-items: flex-end; justify-content: space-between; }
  .eyebrow { font-family: var(--font-sans); font-weight: 800; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--orange-600); }
  h2 { font-family: var(--font-display); font-weight: 600; font-size: 46px; letter-spacing: -0.02em; color: var(--text-strong); margin: 8px 0 0; }
  .head img { height: 26px; }
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 44px; }
  .kpi { background: var(--surface-page); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 24px; }
  .kpi .lbl { font-family: var(--font-sans); font-weight: 700; font-size: 14px; color: var(--text-muted); }
  .kpi .val { font-family: var(--font-display); font-weight: 600; font-size: 52px; line-height: 1; letter-spacing: -0.02em; color: var(--text-strong); margin-top: 14px; }
  .kpi .val small { font-size: 24px; color: var(--text-muted); }
  .kpi .delta { display: inline-flex; align-items: center; gap: 4px; margin-top: 12px; font-family: var(--font-sans); font-weight: 700; font-size: 13px; padding: 3px 10px; border-radius: 999px; }
  .up { background: var(--green-50); color: var(--green-600); }
  .down { background: var(--red-50); color: var(--red-600); }
  .chart { margin-top: 32px; display: flex; align-items: flex-end; gap: 28px; height: 150px; padding: 0 8px; }
  .col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .col .bar { width: 100%; border-radius: 8px 8px 0 0; }
  .col span { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="slide">
    <div class="head">
      <div>
        <div class="eyebrow">Indicadores · 1º semestre</div>
        <h2>Resumo de desempenho</h2>
      </div>
      <img src="../assets/logos/doka-logo-full.png" alt="Doka">
    </div>
    <div class="kpis">
      <div class="kpi"><div class="lbl">SLA no prazo</div><div class="val">96<small>%</small></div><div class="delta up">▲ 2.1 pts</div></div>
      <div class="kpi"><div class="lbl">Entregas</div><div class="val">184<small>k</small></div><div class="delta up">▲ 8%</div></div>
      <div class="kpi"><div class="lbl">Atraso médio</div><div class="val">14<small>min</small></div><div class="delta down">▼ 3 min</div></div>
      <div class="kpi"><div class="lbl">Exceções</div><div class="val">0.4<small>%</small></div><div class="delta up">▲ estável</div></div>
    </div>
    <div class="chart">
      <div class="col"><div class="bar" style="height:62%;background:var(--purple-200)"></div><span>Jan</span></div>
      <div class="col"><div class="bar" style="height:70%;background:var(--purple-200)"></div><span>Fev</span></div>
      <div class="col"><div class="bar" style="height:66%;background:var(--purple-200)"></div><span>Mar</span></div>
      <div class="col"><div class="bar" style="height:84%;background:var(--purple-300)"></div><span>Abr</span></div>
      <div class="col"><div class="bar" style="height:92%;background:var(--orange-400)"></div><span>Mai</span></div>
      <div class="col"><div class="bar" style="height:100%;background:var(--orange-500)"></div><span>Jun</span></div>
    </div>
  </div>
</body>
</html>
